<style>

    --green-dark: #00C96B;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.45);
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
  header { padding: 2rem 1.5rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .logo { font-family: var(--font-display); font-size: clamp(2.2rem, 6vw, 3.5rem); letter-spacing: 0.02em; line-height: 1; }
  .logo span { color: var(--green); }
  .subtitle { font-size: 13px; color: var(--muted); font-weight: 300; margin-top: 4px; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--green); background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.2); border-radius: 99px; padding: 5px 12px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .tabs { display: flex; padding: 0 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 1rem 1.25rem; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab:hover { color: var(--text); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .filters select, .filters input[type=text] { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; font-family: var(--font-body); cursor: pointer; outline: none; }
  .filters input[type=text] { width: 180px; cursor: text; }
  .filters input[type=text]::placeholder { color: var(--muted); }
  .filters select:focus, .filters input:focus { border-color: rgba(0,255,135,0.4); }
  main { padding: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; transition: border-color 0.2s; }
  .card:hover { border-color: rgba(255,255,255,0.15); }
  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .player-name { font-size: 15px; font-weight: 600; }
  .player-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stats-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .stat { flex: 1; background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
  .stat-value { font-size: 17px; font-weight: 600; }
  .stat-value.green { color: var(--green); }
  .vote-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--green); cursor: pointer; }
  .slider-display { font-size: 14px; font-weight: 600; color: var(--green); min-width: 64px; text-align: right; }
  .vote-btn { width: 100%; padding: 9px; font-size: 14px; font-weight: 600; font-family: var(--font-body); cursor: pointer; border-radius: 10px; border: none; background: var(--green); color: #000; transition: background 0.2s, transform 0.1s; }
  .vote-btn:hover:not(:disabled) { background: var(--green-dark); }
  .vote-btn:active:not(:disabled) { transform: scale(0.98); }
  .vote-btn:disabled { cursor: default; }
  .vote-btn.voted { background: transparent !important; border: 1px solid rgba(0,255,135,0.3); color: var(--green); }
  .lb-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); padding: 14px 16px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .rank { font-family: var(--font-display); font-size: 18px; width: 36px; }
  .rank.gold { color: #FFD700; }
  .rank.silver { color: #C0C0C0; }
  .rank.bronze { color: #CD7F32; }
  .lb-avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; margin-right: 10px; vertical-align: middle; }
  .lb-name { font-weight: 600; font-size: 14px; }
  .lb-club { font-size: 12px; color: var(--muted); }
  .pos-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: var(--surface2); color: var(--muted); }
  .mean-val { font-weight: 700; font-size: 15px; color: var(--green); }
  .votes-col { font-size: 12px; color: var(--muted); }
  .bar-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 4px; min-width: 60px; }
  .bar { height: 4px; border-radius: 2px; background: var(--green); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; gap: 10px; color: var(--muted); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--green); color: var(--green); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 99px; opacity: 0; transition: transform 0.3s, opacity 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 1.5rem 0 0; }
  .page-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-family: var(--font-body); cursor: pointer; }
  .page-btn:hover:not(:disabled) { border-color: rgba(0,255,135,0.4); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 13px; color: var(--muted); }
</style>

const players=rawPlayers.map(p=>{const[bg,tc]=clubTheme[p.club]||['#1e1e1e','#fff'];return{...p,bg,tc,initials:ini(p.name)};});

const clubs=[...new Set(players.map(p=>p.club))].sort();
['filter-club','lb-filter-club'].forEach(elId=>{
  const el=document.getElementById(elId);
  if(!el)return;
  clubs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;el.appendChild(o);});
});

const VOTED_KEY='whw_voted_v3';
let voted={};
try{voted=JSON.parse(localStorage.getItem(VOTED_KEY)||'{}');}catch(e){}
function saveVoted(){try{localStorage.setItem(VOTED_KEY,JSON.stringify(voted));}catch(e){}}

async function getVotes(){
  try{const r=await fetch(`${SUPABASE_URL}/rest/v1/votes?select=player_id,value`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});return r.ok?r.json():[];}catch(e){return[];}
}
async function submitVote(player_id,value){
  try{const r=await fetch(`${SUPABASE_URL}/rest/v1/votes`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({player_id,value})});return r.ok;}catch(e){return false;}
}
function computeMeans(rows){
  const map={};
  rows.forEach(r=>{if(!map[r.player_id])map[r.player_id]=[];map[r.player_id].push(r.value);});
  const out={};
  Object.entries(map).forEach(([id,vals])=>{out[id]={mean:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),count:vals.length};});
  return out;
}
let meansCache={};
async function loadMeans(){const rows=await getVotes();meansCache=computeMeans(rows);}
function fmt(v){return v==null?'—':'£'+v+'m';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function getFiltered(clubSel,posSel,votedSel,search){
  const q=(search||'').toLowerCase();
  return players.filter(p=>{
    if(clubSel&&p.club!==clubSel)return false;
    if(posSel&&p.pos!==posSel)return false;
    if(votedSel==='voted'&&!voted[p.id])return false;
    if(votedSel==='unvoted'&&voted[p.id])return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.club.toLowerCase().includes(q))return false;
    return true;
  });
}

function renderCards(){
  const club=document.getElementById('filter-club').value;
  const pos=document.getElementById('filter-pos').value;
  const votedF=document.getElementById('filter-voted').value;
  const search=document.getElementById('search').value;
  const filtered=getFiltered(club,pos,votedF,search);
  const grid=document.getElementById('grid');
  const pagEl=document.getElementById('pagination');
  if(!filtered.length){grid.innerHTML='<div class="empty">No players match this filter.</div>';pagEl.innerHTML='';return;}
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(page>totalPages)page=totalPages;
  const slice=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE); 
  grid.innerHTML=slice.map(p=>{
    const m=meansCache[p.id];
    const mean=m?m.mean:null;
    const count=m?m.count:0;
    const hasVoted=!!voted[p.id];
    const def=Math.round(p.max/2);
    return `<div class="card" id="card-${p.id}">
      <div class="card-top">
        <div class="avatar" style="background:${p.bg};color:${p.tc}">${p.initials}</div>
        <div><div class="player-name">${p.name}</div><div class="player-meta">${p.club} · ${p.pos}</div></div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">Mean value</div><div class="stat-value green" id="mean-${p.id}">${fmt(mean)}</div></div>
        <div class="stat"><div class="stat-label">Total votes</div><div class="stat-value" id="vcount-${p.id}">${count}</div></div>
      </div>
      <div class="vote-label">Your valuation · max £${p.max}m</div>
      <div class="slider-row">
        <input type="range" min="1" max="${p.max}" step="1" value="${hasVoted?voted[p.id]:def}" id="slider-${p.id}" ${hasVoted?'disabled':''} oninput="document.getElementById('disp-${p.id}').textContent='£'+this.value+'m'">
        <span class="slider-display" id="disp-${p.id}">£${hasVoted?voted[p.id]:def}m</span>
      </div>
      <button class="vote-btn${hasVoted?' voted':''}" id="btn-${p.id}" onclick="vote(${p.id})" ${hasVoted?'disabled':''}>
        ${hasVoted?'✓ Voted':'Submit valuation'}
      </button>
    </div>`;
  }).join('');
  pagEl.innerHTML=totalPages>1?`
    <button class="page-btn" onclick="page--;renderCards()" ${page<=1?'disabled':''}>← Prev</button>
    <span class="page-info">Page ${page} of ${totalPages} · ${filtered.length} players</span>
    <button class="page-btn" onclick="page++;renderCards()" ${page>=totalPages?'disabled':''}>Next →</button>
  `:`<span class="page-info">${filtered.length} players</span>`;
}

async function vote(id){
  if(voted[id])return;
  const val=parseInt(document.getElementById('slider-'+id).value);
  const btn=document.getElementById('btn-'+id);
  btn.textContent='Submitting...';btn.disabled=true;
  const ok=await submitVote(id,val);
  if(ok){
    voted[id]=val;saveVoted();
    if(!meansCache[id])meansCache[id]={mean:val,count:1};
    else{const o=meansCache[id],n=o.count+1;meansCache[id]={mean:Math.round((o.mean*o.count+val)/n),count:n};}
    document.getElementById('mean-'+id).textContent=fmt(meansCache[id].mean);
    document.getElementById('vcount-'+id).textContent=meansCache[id].count;
    document.getElementById('slider-'+id).disabled=true;
    btn.textContent='✓ Voted';btn.classList.add('voted');
    showToast('Vote submitted! 🎉');
  }else{
    btn.textContent='Submit valuation';btn.disabled=false;
    showToast('Something went wrong — try again');
  }
}

function renderLeaderboard(){
  const club=document.getElementById('lb-filter-club').value;
  const pos=document.getElementById('lb-filter-pos').value;
  const search=document.getElementById('lb-search').value;
  const filtered=getFiltered(club,pos,'',search);
  const ranked=filtered.map(p=>({p,data:meansCache[p.id]})).filter(x=>x.data).sort((a,b)=>b.data.mean-a.data.mean);
  const el=document.getElementById('lb-content');
  if(!ranked.length){el.innerHTML='<div class="empty">No votes yet — head to the Vote tab to get started!</div>';return;}
  const maxMean=ranked[0].data.mean;
  const rc=['gold','silver','bronze'];
  el.innerHTML=`<div class="lb-wrap"><table>
    <thead><tr><th>#</th><th>Player</th><th>Pos</th><th>Mean value</th><th>Votes</th></tr></thead>
    <tbody>${ranked.map((x,i)=>`<tr>
      <td><span class="rank ${rc[i]||''}">${i+1}</span></td>
      <td><span class="lb-avatar" style="background:${x.p.bg};color:${x.p.tc}">${x.p.initials}</span>
        <span><div class="lb-name">${x.p.name}</div><div class="lb-club">${x.p.club}</div></span></td>
      <td><span class="pos-badge">${x.p.pos}</span></td>
      <td><span class="mean-val">${fmt(x.data.mean)}</span>
        <div class="bar-wrap"><div class="bar" style="width:${Math.round(x.data.mean/maxMean*100)}%"></div></div></td>
      <td class="votes-col">${x.data.count} vote${x.data.count!==1?'s':''}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function setTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('vote-view').style.display=tab==='vote'?'':'none';
  document.getElementById('lb-view').style.display=tab==='leaderboard'?'':'none';
  if(tab==='leaderboard')renderLeaderboard();
}

(async()=>{await loadMeans();renderCards();})();
</script>
